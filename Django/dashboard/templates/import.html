<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importation de Données</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 30px;
            display: flex;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav a {
            text-decoration: none;
        }
        nav button {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }
        nav button:hover {
            background-color: #1abc9c;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        .drop-zone {
            border: 3px dashed #bdc3c7;
            padding: 50px 20px;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }
        .drop-zone.drag-over {
            border-color: #1abc9c;
            background-color: #e8f8f5;
        }
        .drop-zone p {
            font-size: 16px;
            color: #7f8c8d;
            margin: 0 0 10px 0;
        }
        .drop-zone span {
            font-size: 12px;
            color: #95a5a6;
        }
        #file-list {
            margin-top: 20px;
            text-align: left;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .file-item {
            padding: 12px 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .status {
            font-weight: bold;
            font-size: 14px;
        }
        .status.success { color: #2ecc71; }
        .status.error { color: #e74c3c; }
        .status.uploading { color: #3498db; }
    </style>
</head>
<body>

    <nav>
        <a href="/"><button>Retour à l'accueil</button></a>
    </nav>

    <div class="container">
        <h1>Importer des fichiers CSV</h1>
        <p>Glissez-déposez vos fichiers de données ci-dessous pour les analyser et les stocker dans PostgreSQL.</p>

        <div class="drop-zone" id="drop-zone">
            <p>Glissez & Déposez vos fichiers ici</p>
            <span>Format accepté : .csv</span>
            <input type="file" id="file-input" multiple accept=".csv" style="display: none;">
        </div>

        <div id="file-list"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.name.endsWith('.csv')) {
                    uploadFile(file);
                } else {
                    alert(`Le fichier ${file.name} n'est pas un fichier CSV valide.`);
                }
            }
        }

        async function uploadFile(file) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `<span>${file.name}</span><span class="status uploading">Envoi en cours...</span>`;
            fileList.appendChild(item);
            const statusLabel = item.querySelector('.status');

            const formData = new FormData();
            formData.append('fichier_csv', file);

            try {
                const response = await fetch('/upload/', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken') // Protection CSRF obligatoire de Django
                    }
                });

                const result = await response.json();

                if (response.ok) {
                    statusLabel.textContent = "Succès !";
                    statusLabel.className = "status success";
                } else {
                    statusLabel.textContent = result.error || "Erreur lors du traitement";
                    statusLabel.className = "status error";
                }
            } catch (error) {
                statusLabel.textContent = "Erreur réseau";
                statusLabel.className = "status error";
            }
        }

        // Fonction utilitaire pour récupérer le token CSRF de Django
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
